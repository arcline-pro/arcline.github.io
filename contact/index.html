<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Early Access — Arcline</title>
<meta name="description" content="Arcline is an autonomous AI agent that handles your email, social media, leads, clients, support, and invoicing — 24/7 with human oversight when it matters.">
<meta property="og:title" content="Get Early Access — Arcline">
<meta property="og:description" content="Your AI employee that never sleeps.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.ico">
<style>
:root { --primary: #3b82f6; --primary-hover: #2563eb; --bg: #0a0e17; --surface: #111827; --border: #1f2937; --text: #e5e7eb; --muted: #9ca3af; --glow: rgba(59,130,246,0.1); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: inherit; text-decoration: none; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
.btn-primary { display: inline-block; background: var(--primary); color: white; padding: 0.875rem 2rem; border-radius: 0.5rem; font-weight: 600; transition: background 0.2s; border: none; cursor: pointer; font-size: 1rem; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline { display: inline-block; border: 1px solid var(--border); color: white; padding: 0.875rem 2rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s; }
.btn-outline:hover { border-color: var(--muted); background: var(--surface); }
header { position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); background: rgba(10,14,23,0.8); backdrop-filter: blur(12px); }
header .inner { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; max-width: 1200px; margin: 0 auto; }
header nav a { margin-left: 2rem; font-size: 0.875rem; color: var(--muted); transition: color 0.2s; }
header nav a:hover { color: white; }
.logo span:first-child { font-size: 1.5rem; font-weight: 700; color: white; }
.logo span:last-child { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
footer { border-top: 1px solid var(--border); padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-size: 0.875rem; }
.card { border: 1px solid var(--border); background: var(--surface); border-radius: 0.75rem; padding: 1.5rem; transition: border-color 0.2s, box-shadow 0.2s; }
.card:hover { border-color: rgba(59,130,246,0.5); box-shadow: 0 4px 20px var(--glow); }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; }
@media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } header nav { display: none; } }
.text-primary { color: var(--primary); }
.text-muted { color: var(--muted); }
.text-center { text-align: center; }
h1 { font-size: 3rem; font-weight: 700; line-height: 1.1; }
h2 { font-size: 1.875rem; font-weight: 700; }
h3 { font-size: 1.125rem; font-weight: 600; color: white; }
@media (min-width: 768px) { h1 { font-size: 3.75rem; } }
.check { color: var(--primary); margin-right: 0.5rem; }
.waitlist-form { display: flex; gap: 0.75rem; }
.waitlist-form input { flex: 1; padding: 0.875rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--bg); color: white; font-size: 1rem; outline: none; }
.waitlist-form input:focus { border-color: var(--primary); }
.waitlist-form input::placeholder { color: var(--muted); }
@media (max-width: 768px) { .waitlist-form { flex-direction: column; } }
.highlight-list { list-style: none; padding: 0; margin-top: 1rem; }
.highlight-list li { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.375rem; }
.pricing-features { list-style: none; padding: 0; margin-bottom: 2rem; text-align: left; }
.pricing-features li { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.75rem; }
</style>
</head>
<body>

<header>
  <div class="inner">
    <a href="/" class="logo"><span>Arc</span><span>line</span></a>
    <nav>
      <a href="/features/">Features</a>
      <a href="/pricing/">Pricing</a>
      <a href="/about/">About</a>
      <a href="/contact/">Get Early Access</a>
    </nav>
  </div>
</header>
<main>
<section style="padding:6rem 1.5rem; text-align:center; max-width:36rem; margin:0 auto;">
  <h1 style="margin-bottom:1.5rem;">Get Early Access</h1>
  <p style="color:var(--muted); font-size:1.125rem; margin-bottom:2.5rem;">Arcline is launching soon. Drop your email and we'll let you know when it's your turn.</p>
  <div class="card" style="padding:2rem;">
    <div class="waitlist-form" id="waitlist-form">
      <input type="email" id="waitlist-email" placeholder="you@company.com" />
      <button class="btn-primary" onclick="document.getElementById('waitlist-form').innerHTML='<div style=\'padding:1rem\' ><div style=\'font-size:2rem;margin-bottom:0.75rem;\'>&#10003;</div><h2 style=\'font-size:1.5rem;font-weight:700;color:white;margin-bottom:0.5rem;\'>You\'re on the list!</h2><p style=\'color:var(--muted);\'>We\'ll reach out when Arcline is ready. Keep an eye on your inbox.</p></div>'">Join Waitlist</button>
    </div>
    <p style="margin-top:1rem; font-size:0.75rem; color:var(--muted);">No spam. Just one email when Arcline is ready for you.</p>
  </div>
</section>
</main>

<footer>
  <p>&copy; 2026 Autopilot AI Tech LLC. All rights reserved.</p>
  <p style="margin-top:0.5rem"><a href="/privacy/" style="color:var(--muted)">Privacy</a> &middot; <a href="/terms/" style="color:var(--muted)">Terms</a></p>
</footer>
</body>
</html>
